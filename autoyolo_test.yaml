profile_name: default
project_root: .
images_dir: ./images
labels_dir: ./labels
reports_dir: ./reports
classes_file: ./classes.txt
llm_provider: openai
llm_model: cch/gpt-5.4
openai_base_url: https://api.hanbbq.top/v1
opencode_executable: npx
opencode_runner_args: opencode run
opencode_timeout_sec: 180
opencode_fallback_on_openai_error: true
gpt_prompt: Focus on clear visible objects only. Ignore uncertain tiny objects.
detector_backend: local_qwen_vl
box_threshold: 0.29243500000000006
text_threshold: 0.25682625000000003
nms_iou_threshold: 0.5599999999999999
max_detections_per_class: 29
min_box_area_norm: 1.1606071841140001e-05
grounding_dino_model_id: IDEA-Research/grounding-dino-base
inference_device: auto
vlm_base_url: https://api.hanbbq.top/v1
vlm_model: cch/gpt-5.4
vlm_api_key_env: VLM_API_KEY
vlm_max_retries: 2
vlm_timeout_sec: 90
ollama_base_url: http://localhost:11434
ollama_model: qwen2.5vl:3b
ollama_max_retries: 2
ollama_timeout_sec: 90
local_qwen_model_path: ./models/Qwen2.5-VL-3B-Instruct
local_qwen_device: cuda
local_qwen_max_image_side: 640
local_qwen_max_new_tokens: 96
mock_add_center_box: false
